<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, system-ui, sans-serif; width: 340px; padding: 12px; color: #1a1a1a; }
      h1 { font-size: 13px; margin: 0 0 8px; }
      label { display: block; font-size: 11px; color: #666; margin: 8px 0 2px; }
      input, textarea { width: 100%; box-sizing: border-box; padding: 5px 7px; font: 12px ui-monospace, monospace; border: 1px solid #ccc; border-radius: 5px; }
      textarea { resize: vertical; }
      button { margin-top: 10px; padding: 6px 12px; border: 0; border-radius: 6px; background: #111; color: #fff; cursor: pointer; font-size: 12px; }
      button.secondary { background: #e5e5e5; color: #111; }
      .status { margin-top: 10px; font-size: 12px; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
      .ok { background: #16a34a; } .wait { background: #d97706; } .off { background: #9ca3af; }
      .hint { font-size: 10px; color: #888; margin-top: 6px; line-height: 1.4; }
      hr { border: 0; border-top: 1px solid #eee; margin: 14px 0; }
      .progress { margin-top: 8px; font: 11px ui-monospace, monospace; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; background: #fafafa; border: 1px solid #eee; border-radius: 5px; padding: 6px; color: #333; min-height: 18px; }
      .phead { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
      .phead.done { color: #16a34a; } .phead.error { color: #dc2626; } .phead.needs-human { color: #d97706; } .phead.running { color: #2563eb; }
    </style>
  </head>
  <body>
    <h1>Hermit Login Bridge</h1>
    <label>Gateway WS URL</label>
    <input id="url" placeholder="ws://127.0.0.1:47615" />
    <label>Token</label>
    <input id="token" placeholder="from ~/.hermit/login-bridge.json" />
    <button id="save">Save & Connect</button>
    <div class="status"><span id="dot" class="dot off"></span><span id="state">…</span></div>
    <div class="hint">Token: run <code>cat ~/.hermit/login-bridge.json</code> on this Mac and paste it. Load this folder via chrome://extensions → Developer mode → Load unpacked.</div>

    <hr />
    <label>账号字符串（自动登录）</label>
    <textarea id="account" rows="3" placeholder="邮箱----邮箱密码----接码令牌----sk-..."></textarea>
    <button id="login">登录此账号</button>
    <div id="phead" class="phead"></div>
    <div id="progress" class="progress"></div>
    <div class="hint">粘贴成品号一行，点登录即在本机自动跑（sk 在这丢弃、不外传）。需先连上网关。</div>

    <script src="options.js"></script>
  </body>
</html>
